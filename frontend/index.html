<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ricettario</title>
    <link rel="stylesheet" href="./css/style.css" />
    <!-- Dexie.js bundled locally (no CDN, no third-party request) -->
    <script src="./vendor/dexie.min.js"></script>
  </head>
  <body>
    <header class="topbar">
      <h1>Ricettario</h1>
      <nav class="tabs">
        <button data-sezione="ingredienti" class="tab attivo">Ingredienti</button>
        <button data-sezione="ricette" class="tab">Ricette</button>
      </nav>
      <div class="backup-azioni">
        <button id="btn-info">Info</button>
        <button id="btn-esporta">Esporta tutto</button>
        <button id="btn-esporta-parziale">Esporta selezione</button>
        <button id="btn-importa">Importa dati</button>
        <button id="btn-ripristina">Ripristina dati di esempio</button>
        <input id="file-importa" type="file" accept="application/json,.json" hidden />
      </div>
    </header>

    <main id="contenuto">
      <p class="caricamento">Caricamento…</p>
    </main>

    <script type="module" src="./js/app.js"></script>
  </body>
</html>
